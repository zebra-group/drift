appId: de.mindbox.drift
productName: Drift
artifactName: "${productName}-${version}-${arch}.${ext}"
directories:
  output: release
npmRebuild: false
files:
  - dist/**
  - package.json
mac:
  icon: build/icon.icns
  identity: null
  hardenedRuntime: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
win:
  icon: build/icon.ico
  target:
    - nsis
linux:
  icon: build/icon.png
  executableName: drift
  target:
    - AppImage
    - deb
