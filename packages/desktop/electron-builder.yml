appId: de.mindbox.drift
productName: Drift
artifactName: "${productName}-${version}.${ext}"
directories:
  output: release
files:
  - dist/**
  - package.json
mac:
  icon: build/icon.icns
  identity: null
  hardenedRuntime: false
  target:
    - dmg
  category: public.app-category.developer-tools
win:
  icon: build/icon.ico
  target:
    - nsis
linux:
  icon: build/icon.png
  executableName: drift
  target:
    - AppImage
    - deb
