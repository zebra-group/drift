appId: de.mindbox.dbmirror
productName: DB-Mirror
artifactName: "${productName}-${version}.${ext}"
directories:
  output: release
files:
  - dist/**
  - package.json
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
win:
  target:
    - nsis
linux:
  executableName: db-mirror
  target:
    - AppImage
    - deb
